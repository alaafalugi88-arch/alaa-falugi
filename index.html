<!DOCTYPE html>
<html>
<head>
<title>Alaa AI</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

body {
  margin:0;
  font-family:monospace;
  background:black;
  color:#00ffcc;
  display:flex;
}

/* sidebar */
.sidebar {
  width:250px;
  height:100vh;
  background:#050505;
  border-right:1px solid #00ffcc;
  padding:20px;
}

.sidebar h3 {
  margin-bottom:10px;
}

.question {
  margin:10px 0;
  padding:8px;
  border:1px solid #00ffcc;
  cursor:pointer;
  transition:0.3s;
}

.question:hover {
  background:#00ffcc;
  color:black;
  transform:scale(1.05);
}

/* main */
.main {
  flex:1;
  padding:20px;
}

/* chat */
#chat {
  height:300px;
  border:1px solid #00ffcc;
  padding:10px;
  overflow-y:auto;
}

input {
  width:100%;
  padding:10px;
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>💡 Ask AI</h3>

<div class="question" onclick="ask('who is alaa')">Who is Alaa?</div>
<div class="question" onclick="ask('projects')">Projects</div>
<div class="question" onclick="ask('skills')">Skills</div>
<div class="question" onclick="ask('contact')">Contact</div>

</div>

<div class="main">

<h1>🚀 Alaa AI System</h1>

<div id="chat"></div>

<input id="input" placeholder="Ask anything..." />

</div>

<script>

// typing
function typeText(text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  chat.appendChild(div);

  let i=0;
  function typing(){
    if(i<text.length){
      div.innerHTML+=text[i];
      i++;
      chat.scrollTop=chat.scrollHeight;
      setTimeout(typing,10);
    }
  }
  typing();
}

// add message
function addMessage(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.innerHTML="<b>"+sender+":</b> "+text;
  chat.appendChild(div);
}

// AI logic
function smartReply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "Alaa is an AI developer.";
  if(input.includes("skills")) return "Python | SQL | AI";
  if(input.includes("contact")) return "LinkedIn available.";
  if(input.includes("projects")) return "AI Email system + Data analytics.";

  return "Try another question.";
}

// sidebar click
function ask(q){
  addMessage("User", q);
  setTimeout(()=>{
    typeText(smartReply(q));
  },200);
}

// input
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let input=this.value;
    addMessage("User",input);

    setTimeout(()=>{
      typeText(smartReply(input));
    },200);

    this.value="";
  }
});

// welcome
setTimeout(()=>{
  typeText("Welcome to Alaa AI 🤖");
},1000);

</script>

</body>
</html>
