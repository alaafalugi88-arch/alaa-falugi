<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* BODY */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
  color:white;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

/* CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* IMAGE */
.profile {
  width:130px;
  border-radius:50%;
  box-shadow:0 0 30px #00d4ff;
}

/* NAME */
.name {
  font-size:40px;
  margin-top:15px;
  background: linear-gradient(90deg,#00d4ff,#7f5af0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* QUESTIONS CENTER */
.suggestions {
  margin-top:20px;
}

.suggestions div {
  margin:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.3s;
}

.suggestions div:hover {
  background:#7f5af0;
}

/* CHAT ICON */
.chat-btn {
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#7f5af0;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:25px;
}

/* CHAT BOX */
.chat-box {
  position:fixed;
  right:20px;
  bottom:20px;
  width:350px;
  height:500px;
  display:none;

  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:15px;
}

/* FULL MODE */
.chat-box.full {
  width:80%;
  height:80%;
  left:10%;
  right:10%;
  bottom:10%;
}

/* CHAT */
#chat {
  height:85%;
  overflow-y:auto;
}

/* BUBBLE */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#7f5af0;
  margin-left:auto;
}

.ai {
  background:#00d4ff;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<!-- CENTER -->
<div class="center">

<img src="me.jpg" class="profile">

<div class="name">Alaa Falugi</div>

<div class="suggestions">
  <div onclick="ask('who is alaa')">Who is Alaa?</div>
  <div onclick="ask('projects')">Projects</div>
  <div onclick="ask('skills')">Skills</div>
</div>

</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div class="chat-box" id="chatBox">

<div id="chat"></div>

<input id="input" placeholder="Ask something...">

</div>

<script>

/* TOGGLE CHAT */
function toggleChat(){
  let box=document.getElementById("chatBox");

  if(box.style.display==="none" || box.style.display===""){
    box.style.display="block";
  } else {
    box.classList.toggle("full");
  }
}

/* MESSAGE */
function add(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* AI */
function reply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "AI Developer building systems.";
  if(input.includes("skills")) return "Python | SQL | AI";
  if(input.includes("projects")) return "AI Email System + Analytics.";

  return "Ask something else.";
}

/* ASK */
function ask(q){
  toggleChat();
  add("User",q);
  setTimeout(()=>add("AI",reply(q)),300);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;
    add("User",val);
    setTimeout(()=>add("AI",reply(val)),300);
    this.value="";
  }
});

</script>

</body>
</html>
