<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  overflow:hidden;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* LAYOUT */
.container {
  display:flex;
  height:100vh;
}

/* LEFT */
.left {
  width:30%;
  padding:30px;
  backdrop-filter: blur(15px);
  background:rgba(20,20,20,0.6);
}

/* RIGHT */
.right {
  width:70%;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  padding:30px;
}

/* PROFILE */
.profile {
  width:160px;
  height:200px;
  border-radius:15px;
  opacity:0;
  transform:scale(0.8);
  animation:fadeIn 1s forwards;
}

/* NAME */
.name {
  font-size:30px;
  margin-top:10px;
  color:#ffb347;
  opacity:0;
  animation:fadeIn 1.5s forwards;
}

/* QUESTIONS */
.questions {
  margin-top:40px;
  width:250px;
}

.q {
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  opacity:0;
  animation:slideIn 1s forwards;
}

.q:hover {
  background:#ff8c00;
}

/* CHAT */
.chat-box {
  margin-top:auto;
  width:300px;
  height:350px;
  background:rgba(20,20,20,0.7);
  backdrop-filter: blur(15px);
  border-radius:15px;
  padding:10px;
}

#chat {
  height:80%;
  overflow-y:auto;
}

/* BUBBLE */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.user { background:#ff8c00; margin-left:auto; }
.ai { background:#ffcc70; color:black; }

/* INPUT */
input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* POPUP */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:15px;
  display:none;
}

/* ANIMATIONS */
@keyframes fadeIn {
  to {opacity:1; transform:scale(1);}
}

@keyframes slideIn {
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h2>About Me</h2>
  <p>AI Developer building intelligent systems.</p>
</div>

<!-- RIGHT -->
<div class="right">

<img src="me.png" class="profile">
<div class="name">Alaa Falugi</div>

<div class="questions">
  <div class="q" onclick="ask('who')">Who is Alaa?</div>
  <div class="q" onclick="openProjects()">Projects</div>
  <div class="q" onclick="ask('skills')">Skills</div>
</div>

<div class="chat-box">
  <div id="chat"></div>
  <input id="input" placeholder="Ask something...">
</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2>Projects</h2>
  <p>AI Email System + Data Analytics</p>
  <button onclick="closePopup()">Close</button>
</div>

<script>

/* SOUND */
let clickSound = new Audio('click.mp3');

/* ADD MESSAGE */
function add(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  chat.appendChild(div);

  typeText(div,text);
}

/* TYPING EFFECT */
function typeText(el,text){
  let i=0;
  function typing(){
    if(i<text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,30);
    }
  }
  typing();
}

/* AI PERSONA */
function reply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "أنا علاء، مطور ذكاء اصطناعي بحب أبني أنظمة قوية.";
  if(input.includes("skills")) return "أنا بشتغل Python, SQL, AI بشكل احترافي.";
  if(input.includes("projects")) return "عندي مشاريع زي AI Email System.";

  return "جرب تسأل بطريقة ثانية 😉";
}

/* ASK */
function ask(q){
  clickSound.play();
  add("User",q);
  setTimeout(()=>add("AI",reply(q)),400);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;
    ask(val);
    this.value="";
  }
});

/* POPUP */
function openProjects(){
  document.getElementById("popup").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
