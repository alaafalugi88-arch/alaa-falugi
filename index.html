<!DOCTYPE html>
<html>
<head>
  <title>Alaa AI</title>

  <!-- particles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ffcc;
      font-family: monospace;
      overflow: hidden;
    }

    #tsparticles {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      width: 500px;
      margin: auto;
      margin-top: 50px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #00ffcc;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffcc;
      padding: 20px;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      background: #000;
      padding: 10px;
      border: 1px solid #00ffcc;
      margin-bottom: 10px;
    }

    .user { color: cyan; }
    .ai { color: orange; }

    input {
      width: 100%;
      padding: 10px;
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
    }

    .buttons {
      margin-top: 10px;
      text-align: center;
    }

    button {
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 5px 10px;
      margin: 3px;
      cursor: pointer;
    }

    button:hover {
      background: #00ffcc;
      color: black;
    }

    /* popup */
    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      border: 1px solid #00ffcc;
      padding: 20px;
      display: none;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="tsparticles"></div>

<div class="container">

<h2>Alaa AI System</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask the AI..." />

<div class="buttons">
  <button onclick="sendQuick('about')">About</button>
  <button onclick="sendQuick('projects')">Projects</button>
  <button onclick="sendQuick('skills')">Skills</button>
  <button onclick="sendQuick('contact')">Contact</button>
</div>

</div>

<div id="popup"></div>

<script>

// particles
tsParticles.load("tsparticles", {
  particles: {
    number: { value: 60 },
    color: { value: "#00ffcc" },
    size: { value: 2 },
    move: { speed: 1 },
    links: { enable: true, color: "#00ffcc" }
  }
});

// typing effect
function typeText(text, callback) {
  let i = 0;
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "ai";
  chat.appendChild(div);

  function typing() {
    if (i < text.length) {
      div.innerHTML += text.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typing, 20);
    } else {
      if (callback) callback();
    }
  }

  typing();
}

// add message
function addMessage(sender, text) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = sender === "User" ? "user" : "ai";
  div.innerHTML = sender + ": " + text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// smart replies
function smartReply(input) {
  input = input.toLowerCase();

  if (input.includes("about")) {
    return "Alaa is an AI developer building intelligent systems.";
  }

  if (input.includes("skills")) {
    return "Python | SQL | AI | Data Analytics";
  }

  if (input.includes("contact")) {
    return "GitHub: alaafalugi88-arch";
  }

  if (input.includes("projects")) {
    showProjects();
    return "Opening projects...";
  }

  return "Try using the buttons above.";
}

// quick buttons
function sendQuick(cmd) {
  addMessage("User", cmd);
  typeText(smartReply(cmd));
}

// input
document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let input = this.value;
    addMessage("User", input);

    setTimeout(() => {
      typeText(smartReply(input));
    }, 300);

    this.value = "";
  }
});

// popup
function showProjects() {
  let popup = document.getElementById("popup");

  popup.innerHTML = `
    <h3>Projects</h3>
    <p>Email AI System - Auto reply using Python</p>
    <p>Data Analytics Engine - SQL & insights</p>
    <button onclick="closePopup()">Close</button>
  `;

  popup.style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// welcome
setTimeout(() => {
  typeText("Welcome to Alaa AI 🤖");
}, 1000);

</script>

</body>
</html>
