<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  overflow:hidden;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* LAYOUT */
.container {
  display:flex;
  height:100vh;
}

/* LEFT */
.left {
  width:30%;
  padding:30px;
  backdrop-filter: blur(6px);
  background:rgba(20,20,20,0.5);
}

/* RIGHT */
.right {
  width:70%;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  padding:30px;
}

/* PROFILE */
.profile {
  width:160px;
  height:200px;
  border-radius:15px;
  object-fit:cover;
  box-shadow:0 0 20px rgba(255,140,0,0.6);
}

/* NAME */
.name {
  font-size:28px;
  margin-top:10px;
  color:#ffb347;
}

/* QUESTIONS */
.questions {
  margin-top:30px;
  width:250px;
}

.q {
  margin:8px 0;
  padding:10px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.q:hover {
  background:#ff8c00;
}

/* CHAT */
.chat-box {
  margin-top:auto;
  width:280px;
  height:320px;
  background:rgba(20,20,20,0.6);
  backdrop-filter: blur(6px);
  border-radius:15px;
  padding:10px;
}

/* CHAT AREA */
#chat {
  height:75%;
  overflow-y:auto;
}

/* BUBBLE */
.bubble {
  padding:8px;
  margin:8px;
  border-radius:10px;
  max-width:70%;
}

.user { background:#ff8c00; margin-left:auto; }
.ai { background:#ffcc70; color:black; }

/* INPUT */
input {
  width:100%;
  padding:8px;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h2>About Me</h2>
  <p>أنا علاء، مطور ذكاء اصطناعي بحب أبني أنظمة قوية.</p>

  <h2>Skills</h2>
  <p>Python, SQL, AI, Data Analytics</p>
</div>

<!-- RIGHT -->
<div class="right">

<img src="me.png" class="profile">
<div class="name">Alaa Falugi</div>

<div class="questions">
  <div class="q" onclick="ask('who')">Who is Alaa?</div>
  <div class="q" onclick="ask('projects')">Projects</div>
  <div class="q" onclick="ask('skills')">Skills</div>
</div>

<div class="chat-box">
  <div id="chat"></div>
  <input id="input" placeholder="Ask something...">
</div>

</div>

</div>

<script>

/* 🎧 MUSIC */
let music = new Audio('music.mp3');
music.loop = true;
music.volume = 0.2;

/* 🔊 SOUNDS */
let clickSound = new Audio('click.mp3');
let typingSound = new Audio('typing.mp3');

/* ▶️ تشغيل بعد أول click */
document.body.addEventListener("click", () => {
  music.play().catch(()=>{});
}, { once: true });

/* ADD MESSAGE */
function add(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  chat.appendChild(div);

  typeText(div,text);
}

/* 🔥 Typing (خفيف) */
function typeText(el,text){
  let i=0;

  function typing(){
    if(i<text.length){
      el.innerHTML += text.charAt(i);

      // صوت كل 3 حروف فقط
      if(i % 3 === 0 && typingSound.src){
        typingSound.currentTime = 0;
        typingSound.play().catch(()=>{});
      }

      i++;
      setTimeout(typing,50);
    }
  }

  typing();
}

/* AI */
function reply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "أنا علاء، مطور AI بحب أبني أنظمة قوية.";
  if(input.includes("skills")) return "Python | SQL | AI";
  if(input.includes("projects")) return "AI Email System + Analytics.";

  return "جرب تسأل بطريقة ثانية 😉";
}

/* ASK */
function ask(q){
  if(clickSound.src){
    clickSound.currentTime = 0;
    clickSound.play().catch(()=>{});
  }

  add("User",q);
  setTimeout(()=>add("AI",reply(q)),300);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;
    ask(val);
    this.value="";
  }
});

</script>

</body>
</html>
