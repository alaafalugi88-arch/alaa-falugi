<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* BODY */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
  color:white;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* LAYOUT */
.container {
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  padding:20px;
}

/* GLASS */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  box-shadow:0 0 30px rgba(0,212,255,0.2);
}

/* QUESTIONS */
.q {
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.q:hover {
  background:rgba(127,90,240,0.5);
  transform:translateX(5px);
}

/* CENTER */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* TITLE */
.title {
  font-size:50px;
  margin-bottom:20px;

  background: linear-gradient(90deg,#00d4ff,#7f5af0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CHAT BOX */
.chat-box {
  width:70%;
  max-width:800px;
  padding:20px;
}

/* CHAT */
#chat {
  height:300px;
  overflow-y:auto;
}

/* BUBBLE */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#7f5af0;
  margin-left:auto;
}

.ai {
  background:#00d4ff;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  outline:none;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<!-- LEFT -->
<div class="sidebar">
  <div class="glass">
    <h3>Ask</h3>

    <div class="q" onclick="ask('who is alaa')">Who is Alaa?</div>
    <div class="q" onclick="ask('projects')">Projects</div>
    <div class="q" onclick="ask('skills')">Skills</div>
  </div>
</div>

<!-- CENTER -->
<div class="main">

<h1 class="title">Alaa Falugi</h1>

<div class="chat-box glass">

<div id="chat"></div>

<input id="input" placeholder="Ask something..." />

</div>

</div>

<!-- RIGHT -->
<div class="sidebar">
  <div class="glass">
    <h3>Explore</h3>

    <div class="q" onclick="ask('experience')">Experience</div>
    <div class="q" onclick="ask('goals')">Goals</div>
    <div class="q" onclick="ask('linkedin')">LinkedIn</div>
  </div>
</div>

</div>

<script>

/* MESSAGE */
function add(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* AI */
function reply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "AI Developer building intelligent systems.";
  if(input.includes("skills")) return "Python | SQL | AI";
  if(input.includes("projects")) return "AI Email System + Analytics.";
  if(input.includes("linkedin")) return "linkedin.com/in/alaa-zx-134829315";

  return "Try another question.";
}

/* CLICK */
function ask(q){
  add("User",q);
  setTimeout(()=>add("AI",reply(q)),300);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;

    add("User",val);
    setTimeout(()=>add("AI",reply(val)),300);

    this.value="";
  }
});

</script>

</body>
</html>

</div>

</body>
</html>
