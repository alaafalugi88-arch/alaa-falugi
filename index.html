<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* BODY */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;
  overflow:hidden;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* LAYOUT */
.container {
  display:flex;
  height:100vh;
}

/* LEFT (INFO) */
.left {
  width:30%;
  padding:30px;
  backdrop-filter: blur(15px);
  background:rgba(20,20,20,0.6);
}

/* RIGHT */
.right {
  width:70%;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  padding:30px;
}

/* PROFILE */
.profile {
  width:160px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  box-shadow:0 0 25px rgba(255,140,0,0.6);
}

/* NAME */
.name {
  font-size:30px;
  margin-top:10px;
  color:#ffb347;
}

/* QUESTIONS */
.questions {
  margin-top:40px;
  width:250px;
}

.q {
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}

.q:hover {
  background:#ff8c00;
}

/* CHAT */
.chat-box {
  margin-top:auto;
  width:300px;
  height:350px;
  background:rgba(20,20,20,0.7);
  backdrop-filter: blur(15px);
  border-radius:15px;
  padding:10px;
}

/* CHAT AREA */
#chat {
  height:80%;
  overflow-y:auto;
}

/* BUBBLES */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.user {
  background:#ff8c00;
  margin-left:auto;
}

.ai {
  background:#ffcc70;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* LEFT INFO TEXT */
.info h2 {
  color:#ffb347;
}

.info p {
  opacity:0.8;
}

</style>
</head>

<body>

<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">
  <div class="info">
    <h2>About Me</h2>
    <p>AI Developer building intelligent systems and automation tools.</p>

    <h2>Skills</h2>
    <p>Python, SQL, AI, Data Analytics</p>

    <h2>Goal</h2>
    <p>Building powerful AI products and working globally.</p>
  </div>
</div>

<!-- RIGHT SIDE -->
<div class="right">

  <!-- PROFILE -->
  <img src="me.png" class="profile">
  <div class="name">Alaa Falugi</div>

  <!-- QUESTIONS -->
  <div class="questions">
    <div class="q" onclick="ask('who is alaa')">Who is Alaa?</div>
    <div class="q" onclick="ask('projects')">Projects</div>
    <div class="q" onclick="ask('skills')">Skills</div>
    <div class="q" onclick="ask('experience')">Experience</div>
    <div class="q" onclick="ask('goal')">Goals</div>
  </div>

  <!-- CHAT -->
  <div class="chat-box">
    <div id="chat"></div>
    <input id="input" placeholder="Ask something...">
  </div>

</div>

</div>

<script>

function add(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function reply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "AI Developer passionate about building real-world AI systems.";
  if(input.includes("skills")) return "Python | SQL | AI | Data Analytics";
  if(input.includes("projects")) return "AI Email System + Data Analytics.";
  if(input.includes("experience")) return "Worked on AI systems and data projects.";
  if(input.includes("goal")) return "Building global AI products.";

  return "Ask something else.";
}

function ask(q){
  add("User",q);
  setTimeout(()=>add("AI",reply(q)),300);
}

document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;
    add("User",val);
    setTimeout(()=>add("AI",reply(val)),300);
    this.value="";
  }
});

</script>

</body>
</html>
