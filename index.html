<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaa Portfolio</title>

<style>

/* ===== BASE ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* 🎥 VIDEO */
.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* ===== LAYOUT ===== */
.main{
  display:flex;
  height:100vh;
  padding:40px;
}

/* LEFT */
.left{
  width:30%;
}

.left h1{
  font-size:50px;
}

.left p{
  margin-top:15px;
  color:#ccc;
}

.info{
  margin-top:30px;
}

/* CENTER IMAGE */
.center{
  width:40%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:40px;
}

.center img{
  width:360px;
  height:360px;
  object-fit:cover;
  object-position:top;
  border-radius:20px;
  border:3px solid white;
}

/* RIGHT CHAT */
.right{
  width:30%;
  display:flex;
  flex-direction:column;
}

.chat-box{
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  height:60%;
  overflow-y:auto;
}

.messages{
  font-size:14px;
}

input{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* QUESTIONS */
.questions{
  margin-top:15px;
}

.questions button{
  display:block;
  margin-top:5px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;

  background:linear-gradient(135deg,#1e293b,#0f172a);
  color:white;
  border:1px solid #334155;
  transition:0.3s;
}

.questions button:hover{
  background:linear-gradient(135deg,#00e5ff,#6366f1);
  transform:translateY(-2px);
}

/* SCROLL PROJECTS */
.projects{
  padding:60px;
}

.project-card{
  margin-top:20px;
  padding:20px;
  background:#111;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.project-card:hover{
  background:#222;
  transform:translateY(-3px);
}

</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>

<div class="main">

<!-- LEFT -->
<div class="left">
  <h1>Alaa</h1>
  <p>I build smart AI systems and web applications.</p>

  <div class="info">
    <p><b>Field:</b> AI Engineer</p>
    <p><b>Skills:</b> Python, AI, Web Dev</p>
    <p><b>Focus:</b> Automation, NLP, Systems</p>
  </div>
</div>

<!-- CENTER -->
<div class="center">
  <img src="me.png">
</div>

<!-- RIGHT -->
<div class="right">

<div class="chat-box">
  <div class="messages" id="chat"></div>
</div>

<input type="text" id="input" placeholder="Ask me..." onkeypress="send(event)">

<div class="questions">
  <button onclick="ask('who are you')">Who are you?</button>
  <button onclick="ask('skills')">What are your skills?</button>
  <button onclick="ask('projects')">What projects did you build?</button>
  <button onclick="ask('ai')">Do you work in AI?</button>
  <button onclick="ask('experience')">Your experience?</button>
  <button onclick="ask('goal')">What is your goal?</button>
  <button onclick="ask('python')">Do you use Python?</button>
  <button onclick="ask('fastapi')">Do you use FastAPI?</button>
  <button onclick="ask('future')">Future plans?</button>
  <button onclick="ask('contact')">How to contact you?</button>
</div>

</div>

</div>

<!-- PROJECTS -->
<div class="projects">
<h2>Projects</h2>

<div class="project-card" onclick="openProject('https://github.com')">
Email AI Auto Reply System
</div>

<div class="project-card" onclick="openProject('https://github.com')">
KPI Dashboard Analytics
</div>

</div>

<script>

/* CHAT */
function send(e){
  if(e.key === "Enter"){
    let text = document.getElementById("input").value;
    addMsg("You: " + text);
    reply(text);
    document.getElementById("input").value="";
  }
}

function ask(q){
  addMsg("You: " + q);
  reply(q);
}

function addMsg(msg){
  document.getElementById("chat").innerHTML += "<div>"+msg+"</div>";
}

/* BOT LOGIC */
function reply(t){
  t = t.toLowerCase();

  let r = "I will get back to you.";

  if(t.includes("who")) r="I am Alaa, an AI developer.";
  if(t.includes("skills")) r="Python, AI, Web Development.";
  if(t.includes("projects")) r="I built AI email system and dashboards.";
  if(t.includes("ai")) r="Yes, I focus on AI systems.";
  if(t.includes("experience")) r="Working on real-world AI systems.";
  if(t.includes("goal")) r="Build powerful AI solutions.";
  if(t.includes("python")) r="Yes, Python is my main language.";
  if(t.includes("fastapi")) r="Yes, I use FastAPI for APIs.";
  if(t.includes("future")) r="Scaling AI products.";
  if(t.includes("contact")) r="You can reach me via email.";

  setTimeout(()=> addMsg("Neuro AI: " + r),500);
}

/* PROJECT LINK */
function openProject(url){
  window.open(url,"_blank");
}

</script>

</body>
</html>
