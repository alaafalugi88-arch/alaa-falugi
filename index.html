<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* BODY */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY (خففناه 🔥) */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
  z-index:-1;
}

/* CENTER BOX */
.center-box {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:900px;
  padding:30px;
  border-radius:20px;

  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.05);

  box-shadow:0 0 40px rgba(0,212,255,0.3);
}

/* TITLE */
.title {
  text-align:center;
  font-size:60px;
  font-weight:bold;

  background: linear-gradient(90deg,#00d4ff,#7f5af0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 10px #00d4ff;}
  to {text-shadow:0 0 30px #7f5af0;}
}

/* INPUT */
input {
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:16px;
}

/* BUTTON */
button {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#7f5af0;
  color:white;
  cursor:pointer;
  display:block;
  margin-left:auto;
  margin-right:auto;
  transition:0.3s;
}

button:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px #7f5af0;
}

/* TOP NAME */
.logo {
  position:absolute;
  top:20px;
  left:30px;
  color:white;
  font-size:18px;
  opacity:0.7;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="logo">Alaa Portfolio</div>

<div class="center-box">

  <h1 class="title">Alaa Falugi</h1>

  <input placeholder="Ask something..." />

  <button>Enter</button>

</div>

</body>
</html>
