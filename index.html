<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* RESET */
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* LOADING SCREEN */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:#00ffcc;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:20px;
  z-index:10;
}

/* MAIN */
.container {
  display:none;
  padding:20px;
  color:white;
}

/* TITLE */
h1 {
  text-align:center;
  font-size:50px;
  background:linear-gradient(90deg,#00d4ff,#7f5af0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* AVATAR */
.avatar {
  width:140px;
  border-radius:50%;
  display:block;
  margin:auto;
  box-shadow:0 0 50px #00d4ff;
  animation: float 4s infinite ease-in-out;
}

/* FLOAT */
@keyframes float {
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

/* CHAT */
#chat {
  height:300px;
  overflow-y:auto;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
  padding:10px;
}

/* BUBBLE */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#7f5af0;
  margin-left:auto;
}

.ai {
  background:#00d4ff;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- LOADER -->
<div id="loader">
  <p>Initializing Alaa System...</p>
  <p>Loading AI...</p>
</div>

<!-- MAIN -->
<div class="container" id="main">

<img src="me.jpg" class="avatar">

<h1>Alaa Portfolio</h1>

<div id="chat"></div>

<input id="input" placeholder="Ask anything..." />

</div>

<script>

// SOUND
function playSound(){
  new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3").play();
}

// LOADING
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("main").style.display="block";
  welcome();
},3000);

// CHAT
function addMessage(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// AI
function smartReply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "Alaa is an AI engineer.";
  if(input.includes("skills")) return "Python, SQL, AI.";
  if(input.includes("projects")) return "AI Email + Data system.";
  if(input.includes("linkedin")) return "linkedin.com/in/alaa-zx-134829315";

  return "Ask something interesting.";
}

// INPUT
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let input=this.value;
    addMessage("User",input);

    setTimeout(()=>{
      playSound();
      addMessage("AI",smartReply(input));
    },300);

    this.value="";
  }
});

// WELCOME
function welcome(){
  addMessage("AI","Welcome to my AI Portfolio 🚀");
}

</script>

</body>
</html>
