<!DOCTYPE html>
<html>
<head>
  <title>Alaa AI</title>

  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ffcc;
      font-family: monospace;
    }

    #tsparticles {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(0,0,0,0.85);
      border: 1px solid #00ffcc;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px #00ffcc;
    }

    h1, h2 {
      text-align: center;
    }

    #chat {
      height: 250px;
      overflow-y: auto;
      border: 1px solid #00ffcc;
      padding: 10px;
      background: black;
    }

    input {
      width: 100%;
      padding: 10px;
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      margin-top: 10px;
    }

    button {
      margin: 5px;
      padding: 6px 12px;
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    button:hover {
      background: #00ffcc;
      color: black;
    }

    .skill-bar {
      background: #111;
      border: 1px solid #00ffcc;
      margin: 5px 0;
    }

    .skill-fill {
      background: #00ffcc;
      height: 10px;
    }

    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      border: 1px solid #00ffcc;
      padding: 20px;
      display: none;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="tsparticles"></div>

<div class="container">

<h1>🚀 Alaa AI System</h1>

<div class="card">
  <h2>About Alaa</h2>
  <p>AI developer building intelligent systems, automation tools, and real-world AI solutions.</p>
</div>

<div class="card">
  <h2>Skills</h2>
  Python<div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
  SQL<div class="skill-bar"><div class="skill-fill" style="width:85%"></div></div>
  AI / NLP<div class="skill-bar"><div class="skill-fill" style="width:80%"></div></div>
</div>

<div class="card">
  <h2>AI Assistant</h2>

  <div id="chat"></div>
  <input id="input" placeholder="Ask something..." />

  <div>
    <button onclick="sendQuick('who is alaa')">Who is Alaa?</button>
    <button onclick="sendQuick('projects')">Projects</button>
    <button onclick="sendQuick('skills')">Skills</button>
    <button onclick="sendQuick('contact')">Contact</button>
  </div>

</div>

<div class="card">
  <h2>Contact</h2>
  <p>GitHub: alaafalugi88-arch</p>
  <p>LinkedIn: <a href="https://www.linkedin.com/in/alaa-zx-134829315/" target="_blank" style="color:#00ffcc;">Open Profile</a></p>
</div>

</div>

<div id="popup"></div>

<script>

// particles
tsParticles.load("tsparticles", {
  particles: {
    number: { value: 80 },
    color: { value: "#00ffcc" },
    size: { value: 2 },
    move: { speed: 1 },
    links: { enable: true, color: "#00ffcc" }
  }
});

// SOUND
function playSound() {
  let audio = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
  audio.play();
}

// typing effect
function typeText(text) {
  playSound();

  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  chat.appendChild(div);

  let i = 0;

  function typing() {
    if (i < text.length) {
      div.innerHTML += text.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typing, 15);
    }
  }

  typing();
}

// add message
function addMessage(sender, text) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.innerHTML = "<b>" + sender + ":</b> " + text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// replies
function smartReply(input) {
  input = input.toLowerCase();

  if (input.includes("who")) return "Alaa is an AI developer building smart systems.";
  if (input.includes("skills")) return "Python, SQL, AI, NLP, Automation.";
  if (input.includes("contact")) return "GitHub & LinkedIn available below.";

  if (input.includes("projects")) {
    showProjects();
    return "Opening AI modules...";
  }

  return "Try using buttons.";
}

// buttons
function sendQuick(cmd) {
  addMessage("User", cmd);
  setTimeout(() => {
    typeText(smartReply(cmd));
  }, 300);
}

// input
document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let input = this.value;

    addMessage("User", input);

    setTimeout(() => {
      typeText(smartReply(input));
    }, 300);

    this.value = "";
  }
});

// popup
function showProjects() {
  let popup = document.getElementById("popup");

  popup.innerHTML = `
    <h3>AI Projects</h3>
    <p>Email Auto Reply AI</p>
    <p>Data Analytics Engine</p>
    <button onclick="closePopup()">Close</button>
  `;

  popup.style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// welcome
setTimeout(() => {
  typeText("Welcome to Alaa AI System 🤖");
}, 1000);

</script>

</body>
</html>
