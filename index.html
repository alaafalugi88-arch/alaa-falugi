<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaa AI Portfolio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  color: white;
  overflow-x: hidden;
}

/* ===== VIDEO BG ===== */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* ===== CONTENT ===== */
.container {
  margin-left: 80px;
  padding: 100px 20px;
}

h1 {
  font-size: 70px;
}

p {
  margin-top: 20px;
  color: #ccc;
  max-width: 500px;
}

/* ===== BUTTON ===== */
button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* ===== CHAT ===== */
.chat-box {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 300px;
  background: rgba(0,0,0,0.7);
  border-radius: 15px;
  padding: 15px;
}

.messages {
  height: 150px;
  overflow-y: auto;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="container">
  <h1>Alaa</h1>
  <p>I build smart AI systems and web apps.</p>

  <button onclick="playClick()">View Projects</button>
</div>

<!-- 🤖 CHATBOT -->
<div class="chat-box">
  <div class="messages" id="chat"></div>
  <input type="text" id="input" placeholder="Ask me..." onkeypress="send(event)">
</div>

<!-- 🔊 SOUNDS -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="typingSound" src="typing.mp3"></audio>

<script>

/* ===== CLICK SOUND ===== */
function playClick(){
  document.getElementById("clickSound").play();
}

/* ===== CHATBOT ===== */
function send(e){
  if(e.key === "Enter"){
    let input = document.getElementById("input").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += "<div>You: " + input + "</div>";

    document.getElementById("typingSound").play();

    setTimeout(()=>{
      chat.innerHTML += "<div>Bot: " + getReply(input) + "</div>";
    }, 800);

    document.getElementById("input").value = "";
  }
}

function getReply(text){
  text = text.toLowerCase();

  if(text.includes("project")) return "Check my projects section.";
  if(text.includes("ai")) return "I build AI systems and automation.";
  return "I will get back to you soon.";
}

</script>

</body>
</html>
