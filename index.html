<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alaa Portfolio</title>

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{color:white;overflow-x:hidden;}

/* VIDEO */
.video-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}
.video-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 lighter overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

/* LAYOUT */
.main{
  display:flex;
  height:100vh;
  padding:40px;
}

/* LEFT */
.left{width:30%;}
.left h1{font-size:55px;}
.left p{margin-top:10px;color:#ddd;}
.info{margin-top:30px;}

/* CENTER IMAGE */
.center{
  width:40%;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:20px;
}
.center img{
  width:400px;
  height:400px;
  object-fit:cover;
  object-position:top;
  border-radius:25px;
  border:2px solid rgba(255,255,255,0.5);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* RIGHT CHAT */
.right{width:30%;display:flex;flex-direction:column;}

.chat-box{
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  padding:15px;
  border-radius:20px;
  height:60%;
  overflow-y:auto;
}

input{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:none;
}

/* QUESTIONS */
.questions button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;

  background:linear-gradient(135deg,#0ea5e9,#6366f1);
  transition:0.3s;
}

.questions button:hover{
  transform:scale(1.05);
  background:linear-gradient(135deg,#22d3ee,#8b5cf6);
}

/* PROJECTS */
.projects{padding:60px;}
.project-card{
  margin-top:15px;
  padding:20px;
  background:#111;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="bg.mp4">
  </video>
</div>

<div class="overlay"></div>

<div class="main">

<!-- LEFT -->
<div class="left">
  <h1>Alaa</h1>
  <p>I build smart AI systems and web applications.</p>

  <div class="info">
    <p><b>Field:</b> AI Engineer</p>
    <p><b>Skills:</b> Python, AI, Web Dev</p>
    <p><b>Focus:</b> Automation, NLP, Systems</p>
  </div>
</div>

<!-- CENTER -->
<div class="center">
  <img src="me.png">
</div>

<!-- RIGHT -->
<div class="right">

<div class="chat-box" id="chat"></div>

<input id="input" placeholder="Ask me..." onkeydown="send(event)">

<div class="questions">
  <button onclick="ask('who are you')">Who are you?</button>
  <button onclick="ask('skills')">Skills</button>
  <button onclick="ask('projects')">Projects</button>
  <button onclick="ask('ai')">AI</button>
  <button onclick="ask('experience')">Experience</button>
  <button onclick="ask('goal')">Goal</button>
  <button onclick="ask('python')">Python</button>
  <button onclick="ask('fastapi')">FastAPI</button>
  <button onclick="ask('future')">Future</button>
  <button onclick="ask('contact')">Contact</button>
</div>

</div>

</div>

<!-- PROJECTS -->
<div class="projects">
<h2>Projects</h2>

<div class="project-card" onclick="openProject('https://github.com')">
AI Email System
</div>

<div class="project-card" onclick="openProject('https://github.com')">
KPI Dashboard
</div>

</div>

<!-- 🔊 SOUND -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="music" src="music.mp3"></audio>

<script>

/* 🔥 FIX SOUND (IMPORTANT) */
document.addEventListener("click", () => {
  document.getElementById("music").play().catch(()=>{});
});

/* CLICK */
function playClick(){
  document.getElementById("clickSound").play();
}

/* CHAT */
function send(e){
  if(e.key==="Enter"){
    let t=input.value;
    add("You: "+t);
    reply(t);
    input.value="";
    playClick();
  }
}

function ask(q){
  add("You: "+q);
  reply(q);
  playClick();
}

function add(m){
  chat.innerHTML+="<div>"+m+"</div>";
  chat.scrollTop=chat.scrollHeight;
}

/* BOT */
function reply(t){
  t=t.toLowerCase();
  let r="I will reply soon.";

  if(t.includes("who")) r="I am Alaa, an AI engineer.";
  if(t.includes("skills")) r="Python, AI, Web Development.";
  if(t.includes("projects")) r="AI systems and dashboards.";
  if(t.includes("ai")) r="Yes, I focus on AI.";
  if(t.includes("experience")) r="Building real systems.";
  if(t.includes("goal")) r="Create powerful AI tools.";
  if(t.includes("python")) r="Yes, main language.";
  if(t.includes("fastapi")) r="Yes, I use it.";
  if(t.includes("future")) r="Scaling AI.";
  if(t.includes("contact")) r="Reach me via email.";

  setTimeout(()=>add("Neuro AI: "+r),500);
}

/* PROJECT */
function openProject(url){
  window.open(url);
}

</script>

</body>
</html>
