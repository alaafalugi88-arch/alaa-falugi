<!DOCTYPE html>
<html>
<head>
<title>Alaa AI</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

body {
  margin:0;
  font-family:monospace;
  background: radial-gradient(circle at top, #001111, black);
  color:#00ffcc;
  overflow:hidden;
}

/* particles */
#tsparticles {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* cursor glow */
.cursor {
  width:20px;
  height:20px;
  border-radius:50%;
  position:fixed;
  background:#00ffcc;
  pointer-events:none;
  box-shadow:0 0 20px #00ffcc;
}

/* container */
.container {
  width:900px;
  margin:auto;
  padding:20px;
  animation:fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1;}
}

/* profile */
.profile {
  text-align:center;
}

.profile img {
  width:130px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 25px #00ffcc;
  transition:0.3s;
}

.profile img:hover {
  transform:scale(1.15);
  box-shadow:0 0 60px #00ffcc;
}

/* cards */
.card {
  backdrop-filter: blur(10px);
  background:rgba(0,0,0,0.5);
  border:1px solid #00ffcc;
  border-radius:10px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 0 20px #00ffcc;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 0 50px #00ffcc;
}

/* chat */
#chat {
  height:250px;
  overflow-y:auto;
  background:black;
  border:1px solid #00ffcc;
  padding:10px;
}

/* input */
input {
  width:100%;
  padding:10px;
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
}

/* buttons */
button {
  margin:5px;
  padding:6px 12px;
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#00ffcc;
  color:black;
  transform:scale(1.2);
}

/* popup */
#popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:black;
  border:1px solid #00ffcc;
  padding:20px;
  transition:0.3s;
}

#popup.show {
  transform:translate(-50%,-50%) scale(1);
}

</style>
</head>

<body>

<div id="tsparticles"></div>
<div class="cursor" id="cursor"></div>

<div class="container">

<div class="profile">
  <img src="me.jpg">
  <h1>🚀 Alaa AI</h1>
</div>

<div class="card">
  <h2>AI Assistant</h2>

  <div id="chat"></div>
  <input id="input" placeholder="Ask something..." />

  <div>
    <button onclick="sendQuick('who is alaa')">Who is Alaa?</button>
    <button onclick="sendQuick('projects')">Projects</button>
    <button onclick="sendQuick('skills')">Skills</button>
  </div>
</div>

</div>

<div id="popup"></div>

<script>

/* particles */
tsParticles.load("tsparticles", {
  particles:{
    number:{value:120},
    color:{value:"#00ffcc"},
    links:{enable:true,color:"#00ffcc"},
    move:{speed:1}
  }
});

/* cursor effect */
document.addEventListener("mousemove", e=>{
  let c=document.getElementById("cursor");
  c.style.top=e.clientY+"px";
  c.style.left=e.clientX+"px";
});

/* sound */
function playSound(){
  new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3").play();
}

/* typing */
function typeText(text){
  playSound();
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  chat.appendChild(div);

  let i=0;
  function typing(){
    if(i<text.length){
      div.innerHTML+=text[i];
      i++;
      chat.scrollTop=chat.scrollHeight;
      setTimeout(typing,10);
    }
  }
  typing();
}

/* messages */
function addMessage(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.innerHTML="<b>"+sender+":</b> "+text;
  chat.appendChild(div);
}

/* replies */
function smartReply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "Alaa is building AI systems.";
  if(input.includes("skills")) return "Python | SQL | AI";

  if(input.includes("projects")){
    showProjects();
    return "Loading AI Systems...";
  }

  return "Try buttons.";
}

/* input */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let input=this.value;
    addMessage("User",input);

    setTimeout(()=>{
      typeText(smartReply(input));
    },200);

    this.value="";
  }
});

/* buttons */
function sendQuick(cmd){
  addMessage("User",cmd);
  setTimeout(()=>{
    typeText(smartReply(cmd));
  },200);
}

/* popup */
function showProjects(){
  let popup=document.getElementById("popup");

  popup.innerHTML=`
  <h3>AI Systems</h3>
  <p>Email AI System</p>
  <p>Data Analytics Engine</p>
  <button onclick="closePopup()">Close</button>
  `;

  popup.classList.add("show");
}

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

/* welcome */
setTimeout(()=>{
  typeText("Welcome to Alaa AI System 🤖");
},1000);

</script>

</body>
</html>
