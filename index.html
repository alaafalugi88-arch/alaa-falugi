<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* RESET */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* INTRO SCREEN */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:5;
}

.title {
  font-size:60px;
  background: linear-gradient(90deg,#00d4ff,#7f5af0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fadeUp 2s ease;
}

.enter-btn {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#7f5af0;
  color:white;
  font-size:18px;
}

/* MAIN LAYOUT */
.container {
  display:none;
  display:flex;
}

/* SIDEBARS */
.sidebar {
  width:220px;
  height:100vh;
  padding:20px;
  background:rgba(0,0,0,0.5);
}

.question {
  padding:10px;
  margin:10px 0;
  cursor:pointer;
  border-radius:10px;
}

.question:hover {
  background:#7f5af0;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  color:white;
}

/* CHAT */
#chat {
  height:400px;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  padding:10px;
  overflow-y:auto;
}

/* BUBBLE */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#7f5af0;
  margin-left:auto;
}

.ai {
  background:#00d4ff;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1;}
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- INTRO -->
<div id="intro">
  <h1 class="title">Alaa Falugi</h1>
  <button class="enter-btn" onclick="enterSite()">Enter</button>
</div>

<!-- MAIN -->
<div class="container" id="main">

<!-- LEFT -->
<div class="sidebar">
  <h3>Ask</h3>
  <div class="question" onclick="ask('who is alaa')">Who is Alaa?</div>
  <div class="question" onclick="ask('projects')">Projects</div>
  <div class="question" onclick="ask('skills')">Skills</div>
</div>

<!-- CENTER -->
<div class="main">

<h2>Alaa Portfolio</h2>

<div id="chat"></div>

<input id="input" placeholder="Ask something..." />

</div>

<!-- RIGHT -->
<div class="sidebar">
  <h3>Explore</h3>
  <div class="question" onclick="ask('experience')">Experience</div>
  <div class="question" onclick="ask('goals')">Goals</div>
  <div class="question" onclick="ask('linkedin')">LinkedIn</div>
</div>

</div>

<script>

/* ENTER */
function enterSite(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="flex";
}

/* MESSAGE */
function addMessage(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* AI */
function smartReply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "Alaa is an AI engineer.";
  if(input.includes("skills")) return "Python, SQL, AI.";
  if(input.includes("projects")) return "AI Email + Data system.";
  if(input.includes("linkedin")) return "linkedin.com/in/alaa-zx-134829315";

  return "Ask something else.";
}

/* CLICK */
function ask(q){
  addMessage("User",q);
  setTimeout(()=>{
    addMessage("AI",smartReply(q));
  },300);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let input=this.value;

    addMessage("User",input);

    setTimeout(()=>{
      addMessage("AI",smartReply(input));
    },300);

    this.value="";
  }
});

</script>

</body>
</html>
