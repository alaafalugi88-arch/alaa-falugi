<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

/* BODY */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
  color:white;
}

/* VIDEO */
video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.4));
}

/* CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* IMAGE */
.profile {
  width:140px;
  border-radius:50%;
  box-shadow:0 0 30px rgba(0,212,255,0.6);
  margin-bottom:15px;
}

/* NAME */
.name {
  font-size:42px;
  font-weight:bold;
  background: linear-gradient(90deg,#4facfe,#a18cd1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SUGGESTIONS */
.suggestions {
  margin-top:20px;
}

.suggestions div {
  margin:8px;
  padding:10px 15px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  transition:0.2s;
}

.suggestions div:hover {
  background:rgba(79,172,254,0.4);
}

/* CHAT BUTTON */
.chat-btn {
  position:fixed;
  right:20px;
  bottom:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#4facfe;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:22px;
  box-shadow:0 0 15px rgba(79,172,254,0.6);
}

/* CHAT BOX */
.chat-box {
  position:fixed;
  right:20px;
  bottom:20px;
  width:350px;
  height:480px;
  display:none;

  backdrop-filter: blur(15px);
  background:rgba(20,20,20,0.6);
  border-radius:15px;
  padding:15px;
}

/* FULL MODE */
.chat-box.full {
  width:75%;
  height:80%;
  left:12%;
  right:12%;
  bottom:10%;
}

/* CHAT */
#chat {
  height:85%;
  overflow-y:auto;
}

/* BUBBLE */
.bubble {
  padding:10px;
  margin:10px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#a18cd1;
  margin-left:auto;
}

.ai {
  background:#4facfe;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  outline:none;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="overlay"></div>

<!-- CENTER -->
<div class="center">

<img src="me.jpeg" class="profile">

<div class="name">Alaa Falugi</div>

<div class="suggestions">
  <div onclick="ask('who is alaa')">Who is Alaa?</div>
  <div onclick="ask('projects')">Projects</div>
  <div onclick="ask('skills')">Skills</div>
</div>

</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">

<div id="chat"></div>

<input id="input" placeholder="Ask something...">

</div>

<script>

/* TOGGLE */
function toggleChat(){
  let box=document.getElementById("chatBox");

  if(box.style.display==="none" || box.style.display===""){
    box.style.display="block";
  } else {
    box.classList.toggle("full");
  }
}

/* MESSAGE */
function add(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* AI */
function reply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "AI Developer building intelligent systems.";
  if(input.includes("skills")) return "Python | SQL | AI";
  if(input.includes("projects")) return "AI Email System + Analytics.";

  return "Ask something else.";
}

/* ASK */
function ask(q){
  toggleChat();
  add("User",q);
  setTimeout(()=>add("AI",reply(q)),300);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;
    add("User",val);
    setTimeout(()=>add("AI",reply(val)),300);
    this.value="";
  }
});

</script>

</body>
</html>

</script>

</body>
</html>
