<!DOCTYPE html>
<html>
<head>
<title>Alaa Portfolio</title>

<style>

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0c29);
  color:white;
  display:flex;
}

/* Glass Panels */
.panel {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}

/* LEFT */
.sidebar-left {
  width:220px;
  height:100vh;
  padding:20px;
}

.question {
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.question:hover {
  background:rgba(255,255,255,0.1);
  transform:translateX(5px);
}

/* RIGHT */
.sidebar-right {
  width:220px;
  height:100vh;
  padding:20px;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* CHAT */
#chat {
  height:400px;
  border-radius:15px;
  padding:15px;
  overflow-y:auto;
}

/* CHAT BUBBLES */
.bubble {
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  max-width:70%;
}

.user {
  background:#7f5af0;
  margin-left:auto;
}

.ai {
  background:#00d4ff;
  color:black;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

/* TITLE */
h1 {
  text-align:center;
  background: linear-gradient(90deg,#00d4ff,#7f5af0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

</style>
</head>

<body>

<!-- LEFT -->
<div class="sidebar-left panel">
  <h3>💡 Ask</h3>

  <div class="question" onclick="ask('who is alaa')">Who is Alaa?</div>
  <div class="question" onclick="ask('projects')">Projects</div>
  <div class="question" onclick="ask('skills')">Skills</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Alaa Portfolio</h1>

<div id="chat" class="panel"></div>

<input id="input" placeholder="Ask something..." />

</div>

<!-- RIGHT -->
<div class="sidebar-right panel">
  <h3>✨ Explore</h3>

  <div class="question" onclick="ask('experience')">Experience</div>
  <div class="question" onclick="ask('goals')">Goals</div>
  <div class="question" onclick="ask('linkedin')">LinkedIn</div>
</div>

<script>

// bubbles
function addMessage(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");

  div.className="bubble "+(sender==="User"?"user":"ai");
  div.innerHTML=text;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// AI logic
function smartReply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "AI developer building smart systems.";
  if(input.includes("projects")) return "AI Email System + Data Analytics.";
  if(input.includes("skills")) return "Python, SQL, AI.";
  if(input.includes("linkedin")) return "linkedin.com/in/alaa-zx-134829315";

  return "Ask something else.";
}

// sidebar click
function ask(q){
  addMessage("User",q);
  setTimeout(()=>{
    addMessage("AI",smartReply(q));
  },300);
}

// input
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let input=this.value;

    addMessage("User",input);

    setTimeout(()=>{
      addMessage("AI",smartReply(input));
    },300);

    this.value="";
  }
});

// welcome
setTimeout(()=>{
  addMessage("AI","Welcome to Alaa Portfolio 🚀");
},1000);

</script>

</body>
</html>
