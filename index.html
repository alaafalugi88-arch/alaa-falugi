<!DOCTYPE html>
<html>
<head>
  <title>Alaa AI</title>

  <style>
    body {
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 500px;
      background: #111;
      border: 1px solid #00ffcc;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffcc;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #00ffcc;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #00ffcc;
      padding: 10px;
      margin-bottom: 10px;
      background: #000;
    }

    .user {
      color: #00ffff;
    }

    .ai {
      color: #ff9900;
    }

    input {
      width: 100%;
      padding: 10px;
      background: #000;
      border: 1px solid #00ffcc;
      color: #00ffcc;
    }

    .boot {
      font-size: 12px;
      margin-bottom: 10px;
      color: #888;
    }

    .commands {
      margin-top: 10px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Alaa AI System</h2>

  <div class="boot" id="boot"></div>

  <div id="chat"></div>

  <input id="input" placeholder="Ask the AI..." />

  <div class="commands">
    help | projects | skills | about | contact
  </div>

</div>

<script>

// Boot animation
let text = [
  "Initializing AI...",
  "Loading systems...",
  "Connecting...",
  "Ready ✔"
];

let i = 0;

function typeLine() {
  if (i < text.length) {
    document.getElementById("boot").innerHTML += text[i] + "<br>";
    i++;
    setTimeout(typeLine, 600);
  }
}

typeLine();

// Welcome message
setTimeout(() => {
  addMessage("AI", "Welcome to Alaa AI 🤖 Type 'help' to start.");
}, 2500);

// Add message function
function addMessage(sender, message) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.innerHTML = `<span class="${sender === "User" ? "user" : "ai"}">${sender}:</span> ${message}`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Smart replies
function smartReply(input) {
  input = input.toLowerCase();

  if (input.includes("help")) {
    return "Commands: projects, skills, about, contact";
  }

  if (input.includes("about")) {
    return "Alaa is an AI developer building smart systems.";
  }

  if (input.includes("projects")) {
    return "1. Email AI System\n2. Data Analytics Engine";
  }

  if (input.includes("skills")) {
    return "Python | SQL | AI | Automation";
  }

  if (input.includes("contact")) {
    return "GitHub: alaafalugi88-arch";
  }

  return "Unknown command. Type 'help'.";
}

// Input handler
document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let input = this.value;

    addMessage("User", input);

    let reply = smartReply(input);

    setTimeout(() => {
      addMessage("AI", reply);
    }, 400);

    this.value = "";
  }
});

</script>

</body>
</html>
