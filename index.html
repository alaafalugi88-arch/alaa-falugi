<!DOCTYPE html>
<html>
<head>
<title>Alaa AI</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

body {
  margin:0;
  font-family:monospace;
  background: linear-gradient(135deg,#000,#020d0d,#000);
  color:#00ffcc;
  overflow:hidden;
}

/* particles */
#tsparticles {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* container */
.container {
  width:900px;
  margin:auto;
  padding:20px;
  animation:fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}

/* profile */
.profile {
  text-align:center;
}

.profile img {
  width:120px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
  transition:0.3s;
}

.profile img:hover {
  transform:scale(1.1);
  box-shadow:0 0 40px #00ffcc;
}

/* cards */
.card {
  background:rgba(0,0,0,0.7);
  border:1px solid #00ffcc;
  border-radius:10px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 0 15px #00ffcc;
  transition:0.3s;
}

.card:hover {
  box-shadow:0 0 30px #00ffcc;
  transform:translateY(-5px);
}

/* chat */
#chat {
  height:250px;
  overflow-y:auto;
  background:black;
  border:1px solid #00ffcc;
  padding:10px;
}

/* input */
input {
  width:100%;
  padding:10px;
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
}

/* buttons */
button {
  margin:5px;
  padding:6px 12px;
  background:black;
  border:1px solid #00ffcc;
  color:#00ffcc;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#00ffcc;
  color:black;
  transform:scale(1.1);
}

/* skill bars */
.skill-bar {
  background:#111;
  border:1px solid #00ffcc;
  margin:5px 0;
}

.skill-fill {
  background:#00ffcc;
  height:10px;
}

/* popup */
#popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  border:1px solid #00ffcc;
  padding:20px;
  display:none;
}

</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="container">

<div class="profile">
  <img src="me.jpg">
  <h1>🚀 Alaa AI</h1>
</div>

<div class="card">
  <h2>About Me</h2>
  <p>AI developer building intelligent systems and automation tools.</p>
</div>

<div class="card">
  <h2>Skills</h2>
  Python<div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
  SQL<div class="skill-bar"><div class="skill-fill" style="width:85%"></div></div>
  AI<div class="skill-bar"><div class="skill-fill" style="width:80%"></div></div>
</div>

<div class="card">
  <h2>AI Assistant</h2>

  <div id="chat"></div>
  <input id="input" placeholder="Ask something..." />

  <div>
    <button onclick="sendQuick('who is alaa')">Who is Alaa?</button>
    <button onclick="sendQuick('projects')">Projects</button>
    <button onclick="sendQuick('skills')">Skills</button>
    <button onclick="sendQuick('contact')">Contact</button>
  </div>
</div>

<div class="card">
  <h2>Contact</h2>
  <p>GitHub: alaafalugi88-arch</p>
  <p><a href="https://www.linkedin.com/in/alaa-zx-134829315/" target="_blank" style="color:#00ffcc;">LinkedIn</a></p>
</div>

</div>

<div id="popup"></div>

<script>

/* particles */
tsParticles.load("tsparticles", {
  particles:{
    number:{value:100},
    color:{value:"#00ffcc"},
    links:{enable:true,color:"#00ffcc"},
    move:{speed:1}
  }
});

/* sound */
function playSound(){
  let audio=new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
  audio.play();
}

/* typing */
function typeText(text){
  playSound();
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  chat.appendChild(div);

  let i=0;

  function typing(){
    if(i<text.length){
      div.innerHTML+=text.charAt(i);
      i++;
      chat.scrollTop=chat.scrollHeight;
      setTimeout(typing,15);
    }
  }

  typing();
}

/* message */
function addMessage(sender,text){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.innerHTML="<b>"+sender+":</b> "+text;
  chat.appendChild(div);
}

/* replies */
function smartReply(input){
  input=input.toLowerCase();

  if(input.includes("who")) return "Alaa is an AI developer.";
  if(input.includes("skills")) return "Python, SQL, AI.";
  if(input.includes("contact")) return "Check LinkedIn.";
  if(input.includes("projects")){
    showProjects();
    return "Opening systems...";
  }

  return "Try buttons.";
}

/* input */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let input=this.value;
    addMessage("User",input);

    setTimeout(()=>{
      typeText(smartReply(input));
    },300);

    this.value="";
  }
});

/* buttons */
function sendQuick(cmd){
  addMessage("User",cmd);
  setTimeout(()=>{
    typeText(smartReply(cmd));
  },300);
}

/* popup */
function showProjects(){
  let popup=document.getElementById("popup");

  popup.innerHTML=`
  <h3>AI Systems</h3>
  <p>Email AI System</p>
  <p>Data Analytics Engine</p>
  <button onclick="closePopup()">Close</button>
  `;

  popup.style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* welcome */
setTimeout(()=>{
  typeText("Welcome to Alaa AI System 🤖");
},1000);

</script>

</body>
</html>
